{% extends "encyclopedia/layout.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
</head>
<body>
{% block body %}
    {% for query in queries %}
        <a href="/wiki/{{ entry }}"><li>{{ queries }}</li></a>
    {% endfor %}
{% endblock %}
</body>
</html>
